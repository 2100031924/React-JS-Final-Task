server:
  port: 8080

spring:
  application:
    name: producthub
  
  datasource:
    url: jdbc:h2:mem:producthub
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - openid
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
            scope:
              - email
              - public_profile
            redirect-Uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            
        provider:
          google:
            issuer-uri: https://accounts.google.com
          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth
            token-uri: https://graph.facebook.com/v18.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture

app:
  jwt:
    secret: ${JWT_SECRET:producthub-secret-key-for-jwt-token-generation-must-be-at-least-256-bits}
    expiration: 86400000

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
